<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYSTERO — Mycelium Smart Threat-Evaluating & Regrowing Organic-box</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f172a;
    --bg2: #0a1020;
    --surface: rgba(255,255,255,0.04);
    --surface-border: rgba(255,255,255,0.08);
    --blue: #3b82f6;
    --blue-glow: rgba(59,130,246,0.35);
    --blue-dim: rgba(59,130,246,0.15);
    --pink: #ec4899;
    --pink-glow: rgba(236,72,153,0.35);
    --pink-dim: rgba(236,72,153,0.12);
    --green: #10b981;
    --green-glow: rgba(16,185,129,0.35);
    --green-dim: rgba(16,185,129,0.12);
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --text-dimmer: #475569;
    --font-head: 'Syne', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --font-mono: 'Space Mono', monospace;
    --radius: 16px;
    --radius-lg: 24px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.7;
    overflow-x: hidden;
  }
  ::selection { background: var(--blue-dim); color: #fff; }
  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 3px; }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 5vw;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(20px);
    background: rgba(15,23,42,0.75);
    border-bottom: 1px solid var(--surface-border);
    transition: all 0.3s;
  }
  .nav-logo {
    font-family: var(--font-head); font-weight: 800; font-size: 1.4rem;
    background: linear-gradient(135deg, var(--blue), var(--green));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 0.05em;
  }
  .nav-links { display: flex; gap: 32px; list-style: none; }
  .nav-links a {
    color: var(--text-dim); text-decoration: none; font-size: 0.85rem;
    font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--blue); }

  /* SECTION UTILS */
  section { padding: 100px 5vw; }
  .section-label {
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 14px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::before {
    content: ''; display: block; width: 24px; height: 1px; background: var(--blue);
  }
  h2 {
    font-family: var(--font-head); font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    font-weight: 800; line-height: 1.15; margin-bottom: 16px;
  }
  .lead { font-size: 1.05rem; color: var(--text-dim); max-width: 580px; margin-bottom: 56px; }
  .glass {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: var(--radius-lg);
    backdrop-filter: blur(12px);
  }
  .glow-blue { box-shadow: 0 0 40px var(--blue-glow); }
  .glow-pink { box-shadow: 0 0 40px var(--pink-glow); }
  .glow-green { box-shadow: 0 0 40px var(--green-glow); }

  /* REVEAL ANIMATIONS */
  .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-left { opacity: 0; transform: translateX(-40px); transition: opacity 0.8s ease, transform 0.8s ease; }
  .reveal-left.visible { opacity: 1; transform: translateX(0); }
  .reveal-scale { opacity: 0; transform: scale(0.9); transition: opacity 0.7s ease, transform 0.7s ease; }
  .reveal-scale.visible { opacity: 1; transform: scale(1); }

  /* ===== HERO ===== */
  #hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center;
    padding: 120px 5vw 80px;
    position: relative; overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 40%, rgba(59,130,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 10% 80%, rgba(16,185,129,0.08) 0%, transparent 55%),
      radial-gradient(ellipse 40% 40% at 85% 80%, rgba(236,72,153,0.07) 0%, transparent 50%);
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
  }
  .hero-content { position: relative; z-index: 2; max-width: 900px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 16px; border-radius: 100px;
    background: var(--blue-dim); border: 1px solid var(--blue);
    font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.12em;
    color: var(--blue); margin-bottom: 32px;
    animation: pulse-badge 3s ease-in-out infinite;
  }
  .hero-badge-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
    animation: blink 1.5s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
  @keyframes pulse-badge { 0%,100%{box-shadow:0 0 0 0 var(--blue-glow)} 50%{box-shadow:0 0 20px 4px var(--blue-glow)} }
  h1 {
    font-family: var(--font-head); font-size: clamp(2.2rem, 5.5vw, 5rem);
    font-weight: 800; line-height: 1.05; margin-bottom: 24px;
  }
  .h1-accent { color: var(--blue); }
  .hero-sub {
    font-size: clamp(1.1rem, 2vw, 1.4rem); color: var(--text-dim);
    font-style: italic; margin-bottom: 48px; font-weight: 300;
  }
  .hero-sub span { color: var(--green); font-style: normal; font-weight: 500; }
  .hero-cta {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 80px;
  }
  .btn {
    padding: 14px 28px; border-radius: 100px; font-weight: 600;
    font-family: var(--font-body); font-size: 0.9rem; cursor: pointer;
    border: none; transition: all 0.25s; text-decoration: none; display: inline-block;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: var(--blue); color: #fff;
    box-shadow: 0 4px 24px var(--blue-glow);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 40px var(--blue-glow); background: #60a5fa; }
  .btn-ghost {
    background: transparent; color: var(--text);
    border: 1px solid var(--surface-border);
  }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); transform: translateY(-2px); }

  /* 3D BOX FLOAT */
  .hero-box-wrap {
    position: absolute; right: 5vw; top: 50%; transform: translateY(-50%);
    z-index: 2; animation: float-box 5s ease-in-out infinite;
  }
  @keyframes float-box {
    0%,100%{transform:translateY(-50%) rotate3d(1,1,0,0deg)}
    33%{transform:translateY(calc(-50% - 18px)) rotate3d(1,1,0,4deg)}
    66%{transform:translateY(calc(-50% + 10px)) rotate3d(1,1,0,-3deg)}
  }
  .hero-box {
    width: 180px; height: 180px;
    background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(16,185,129,0.15));
    border: 1px solid rgba(59,130,246,0.5);
    border-radius: 20px;
    position: relative;
    box-shadow: 0 0 60px var(--blue-glow), inset 0 0 30px rgba(59,130,246,0.1);
    transform-style: preserve-3d;
  }
  .hero-box::before {
    content: ''; position: absolute; inset: 0; border-radius: 20px;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
  }
  .hero-box-inner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    text-align: center;
  }
  .hero-box-icon { font-size: 3rem; margin-bottom: 8px; filter: drop-shadow(0 0 12px var(--blue)); }
  .hero-box-text { font-family: var(--font-mono); font-size: 0.6rem; color: var(--blue); letter-spacing: 0.1em; }
  .hero-box-ring {
    position: absolute; inset: -20px; border-radius: 50%;
    border: 1px dashed rgba(59,130,246,0.3);
    animation: spin-ring 20s linear infinite;
  }
  .hero-box-ring2 {
    position: absolute; inset: -40px; border-radius: 50%;
    border: 1px dashed rgba(16,185,129,0.2);
    animation: spin-ring 30s linear infinite reverse;
  }
  @keyframes spin-ring { to { transform: rotate(360deg); } }

  /* SCROLL DOWN */
  .scroll-down {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em;
    color: var(--text-dimmer); cursor: pointer; z-index: 2;
    animation: bounce-down 2.5s ease-in-out infinite;
  }
  .scroll-down-arrow {
    width: 28px; height: 28px; border-right: 2px solid var(--text-dimmer);
    border-bottom: 2px solid var(--text-dimmer); transform: rotate(45deg);
  }
  @keyframes bounce-down { 0%,100%{transform:translateX(-50%) translateY(0)} 50%{transform:translateX(-50%) translateY(10px)} }

  /* ===== KRISIS ===== */
  #krisis { background: var(--bg2); }
  .krisis-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 28px; margin-bottom: 48px;
  }
  .krisis-card {
    padding: 36px; border-radius: var(--radius-lg);
    background: var(--surface); border: 1px solid var(--surface-border);
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: default;
  }
  .krisis-card:hover { transform: translateY(-6px); }
  .krisis-card:nth-child(1):hover { box-shadow: 0 20px 60px var(--pink-glow); border-color: rgba(236,72,153,0.3); }
  .krisis-card:nth-child(2):hover { box-shadow: 0 20px 60px var(--green-glow); border-color: rgba(16,185,129,0.3); }
  .krisis-card-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .krisis-card h3 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
  .krisis-card p { color: var(--text-dim); font-size: 0.92rem; line-height: 1.7; }
  .counters-row { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; }
  .counter-card {
    padding: 40px; border-radius: var(--radius-lg); text-align: center;
    background: linear-gradient(135deg, var(--surface), rgba(59,130,246,0.05));
    border: 1px solid rgba(59,130,246,0.2);
    box-shadow: 0 0 30px var(--blue-glow);
  }
  .counter-val {
    font-family: var(--font-head); font-size: clamp(2.5rem, 5vw, 4rem);
    font-weight: 800; color: var(--blue); line-height: 1;
    margin-bottom: 8px;
  }
  .counter-label { color: var(--text-dim); font-size: 0.85rem; letter-spacing: 0.05em; }

  /* ===== PILAR ===== */
  #pilar { }
  .pilar-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }
  .flip-card { perspective: 1000px; height: 340px; cursor: pointer; }
  .flip-inner {
    width: 100%; height: 100%;
    transform-style: preserve-3d; transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .flip-card:hover .flip-inner, .flip-card.flipped .flip-inner { transform: rotateY(180deg); }
  .flip-front, .flip-back {
    position: absolute; inset: 0; border-radius: var(--radius-lg);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    padding: 36px; display: flex; flex-direction: column; justify-content: flex-end;
    border: 1px solid var(--surface-border);
  }
  .flip-front {
    background: var(--surface);
    overflow: hidden;
  }
  .flip-front::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 30%, rgba(15,23,42,0.9));
  }
  .flip-front-icon {
    position: absolute; top: 28px; right: 28px; font-size: 3.5rem;
    filter: drop-shadow(0 0 20px currentColor); opacity: 0.8;
  }
  .flip-front h3 {
    font-family: var(--font-head); font-size: 1.3rem; font-weight: 800;
    position: relative; z-index: 1;
  }
  .flip-front .flip-sub { color: var(--text-dim); font-size: 0.8rem; position: relative; z-index: 1; margin-top: 6px; }
  .flip-back {
    background: var(--surface); transform: rotateY(180deg);
    justify-content: center;
  }
  .flip-back p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.75; }
  .flip-back h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 14px; }
  .flip-card:nth-child(1) .flip-front { background: linear-gradient(135deg, #1e3a5f, #0f172a); }
  .flip-card:nth-child(1) .flip-front-icon { color: var(--blue); }
  .flip-card:nth-child(1):hover .flip-front { box-shadow: 0 0 40px var(--blue-glow); }
  .flip-card:nth-child(2) .flip-front { background: linear-gradient(135deg, #2d1b4e, #0f172a); }
  .flip-card:nth-child(2) .flip-front-icon { color: var(--pink); }
  .flip-card:nth-child(2):hover .flip-front { box-shadow: 0 0 40px var(--pink-glow); }
  .flip-card:nth-child(3) .flip-front { background: linear-gradient(135deg, #0d3321, #0f172a); }
  .flip-card:nth-child(3) .flip-front-icon { color: var(--green); }
  .flip-card:nth-child(3):hover .flip-front { box-shadow: 0 0 40px var(--green-glow); }
  .flip-hint {
    position: absolute; bottom: 16px; right: 20px;
    font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dimmer);
    z-index: 2; transition: opacity 0.3s;
  }
  .flip-card:hover .flip-hint { opacity: 0; }

  /* ===== SENSOR SIMULATOR ===== */
  #sensor { background: var(--bg2); }
  .sensor-demo {
    max-width: 700px; margin: 0 auto;
    padding: 60px 48px; border-radius: 28px;
    background: linear-gradient(135deg, rgba(59,130,246,0.2), rgba(59,130,246,0.05));
    border: 2px solid var(--blue);
    box-shadow: 0 0 60px var(--blue-glow), 0 0 120px rgba(59,130,246,0.1);
    text-align: center; cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
    position: relative; overflow: hidden;
    user-select: none;
  }
  .sensor-demo::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 50%, rgba(59,130,246,0.1), transparent 70%);
    transition: all 0.4s;
  }
  .sensor-demo:hover {
    background: linear-gradient(135deg, rgba(236,72,153,0.35), rgba(236,72,153,0.1));
    border-color: var(--pink);
    box-shadow: 0 0 80px var(--pink-glow), 0 0 160px rgba(236,72,153,0.12);
    transform: scale(1.02);
  }
  .sensor-demo:hover::before {
    background: radial-gradient(circle at 50% 50%, rgba(236,72,153,0.15), transparent 70%);
  }
  .sensor-status {
    font-family: var(--font-head); font-size: clamp(1.4rem, 3vw, 2.2rem);
    font-weight: 800; transition: all 0.4s; color: var(--blue);
    margin-bottom: 16px; position: relative; z-index: 1;
  }
  .sensor-demo:hover .sensor-status { color: var(--pink); }
  .sensor-ph {
    font-family: var(--font-mono); font-size: 4rem; font-weight: 700;
    transition: all 0.4s; color: rgba(59,130,246,0.7);
    position: relative; z-index: 1; line-height: 1;
  }
  .sensor-demo:hover .sensor-ph { color: rgba(236,72,153,0.9); }
  .sensor-desc {
    font-size: 0.85rem; color: var(--text-dim); margin-top: 16px;
    transition: color 0.4s; position: relative; z-index: 1;
  }
  .sensor-demo:hover .sensor-desc { color: rgba(236,72,153,0.8); }
  .sensor-hint {
    margin-top: 32px; font-family: var(--font-mono); font-size: 0.65rem;
    color: var(--text-dimmer); letter-spacing: 0.1em;
  }
  /* Molecular shape */
  .mol-shape {
    width: 80px; height: 80px; margin: 0 auto 24px;
    position: relative; z-index: 1;
    transition: all 0.4s;
  }
  .mol-ring {
    width: 60px; height: 60px; border-radius: 50%;
    border: 3px solid var(--blue);
    margin: 0 auto 8px;
    transition: all 0.4s;
    box-shadow: 0 0 15px var(--blue-glow);
    display: flex; align-items: center; justify-content: center;
  }
  .mol-ring-inner {
    width: 24px; height: 24px; border-radius: 50%;
    background: var(--blue); transition: all 0.4s;
    opacity: 0.6;
  }
  .sensor-demo:hover .mol-ring { border-color: var(--pink); box-shadow: 0 0 20px var(--pink-glow), 0 0 40px var(--pink-glow); border-radius: 30% 70% 70% 30%/30% 30% 70% 70%; animation: agitate 0.5s ease-in-out infinite alternate; }
  .sensor-demo:hover .mol-ring-inner { background: var(--pink); border-radius: 20% 80% 30% 70%/50% 30% 70% 50%; }
  @keyframes agitate { to { transform: rotate(8deg) scale(1.1); border-radius: 70% 30% 30% 70%/70% 70% 30% 30%; } }

  /* ===== MOLECULAR ===== */
  #molecular { }

  /* ===== CIRCULAR ECONOMY ===== */
  #circular { background: var(--bg2); }
  .cycle-steps { display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; margin-top: 48px; }
  .cycle-step {
    padding: 32px 24px; border-radius: var(--radius-lg);
    background: var(--surface); border: 1px solid var(--surface-border);
    text-align: center; cursor: pointer; transition: all 0.35s;
    position: relative; overflow: hidden;
  }
  .cycle-step::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, transparent, rgba(255,255,255,0.02));
    opacity: 0; transition: opacity 0.3s;
  }
  .cycle-step:hover::before { opacity: 1; }
  .cycle-step.active {
    border-color: var(--blue);
    box-shadow: 0 0 40px var(--blue-glow);
    background: linear-gradient(135deg, rgba(59,130,246,0.12), var(--surface));
    transform: translateY(-8px);
  }
  .cycle-step-num {
    font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dimmer);
    margin-bottom: 12px; letter-spacing: 0.1em;
  }
  .cycle-step-icon { font-size: 2.5rem; margin-bottom: 16px; }
  .cycle-step h3 { font-family: var(--font-head); font-size: 1rem; font-weight: 700; margin-bottom: 10px; }
  .cycle-step p { font-size: 0.82rem; color: var(--text-dim); line-height: 1.65; }
  .cycle-detail {
    margin-top: 24px; padding: 28px 36px; border-radius: var(--radius);
    background: linear-gradient(135deg, rgba(59,130,246,0.08), rgba(59,130,246,0.02));
    border: 1px solid rgba(59,130,246,0.25);
    transition: all 0.4s;
    min-height: 80px; display: flex; align-items: center;
  }
  .cycle-detail p { color: var(--text-dim); font-size: 0.92rem; }

  /* ===== TIMELINE ===== */
  #timeline { }
  .timeline-wrap { position: relative; max-width: 720px; margin: 0 auto; }
  .timeline-line {
    position: absolute; left: 28px; top: 0; bottom: 0; width: 2px;
    background: var(--surface-border);
  }
  .timeline-progress {
    position: absolute; left: 0; top: 0; width: 100%;
    background: linear-gradient(to bottom, var(--blue), var(--green));
    transition: height 0.4s ease;
    height: 0%;
  }
  .timeline-item {
    display: flex; gap: 36px; margin-bottom: 52px; position: relative;
    transition: all 0.3s;
  }
  .timeline-dot {
    width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
    background: var(--bg); border: 2px solid var(--surface-border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; transition: all 0.4s; position: relative; z-index: 1;
  }
  .timeline-item.lit .timeline-dot {
    border-color: var(--blue);
    box-shadow: 0 0 24px var(--blue-glow);
    background: linear-gradient(135deg, rgba(59,130,246,0.2), var(--bg));
  }
  .timeline-body { padding-top: 8px; }
  .timeline-step-num { font-family: var(--font-mono); font-size: 0.65rem; color: var(--blue); letter-spacing: 0.12em; margin-bottom: 6px; }
  .timeline-body h3 { font-family: var(--font-head); font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
  .timeline-body p { color: var(--text-dim); font-size: 0.92rem; }

  /* ===== PENGUJIAN ===== */
  #pengujian { background: var(--bg2); }
  .metric-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 24px; }
  .metric-card {
    padding: 36px 28px; border-radius: var(--radius-lg);
